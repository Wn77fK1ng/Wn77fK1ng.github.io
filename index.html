<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLogger - 智能健身助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            text-align: center;
        }
        .logo {
            font-size: 72px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 42px;
            color: #D4A843;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 20px;
            color: #cccccc;
            margin-top: 8px;
            font-weight: 300;
        }
        .tagline {
            font-size: 16px;
            color: #888888;
            margin-top: 20px;
            border-top: 1px solid #333333;
            padding-top: 20px;
        }
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 30px;
        }
        .feature-item {
            background: #1a1a1a;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            color: #dddddd;
        }
        .feature-item span {
            display: block;
            font-size: 24px;
            margin-bottom: 4px;
        }
        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #666666;
        }
        .footer a {
            color: #D4A843;
            text-decoration: none;
        }
        .badge {
            display: inline-block;
            background: #D4A843;
            color: #000000;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 12px;
        }
        @media (max-width: 480px) {
            h1 { font-size: 30px; }
            .features { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏋️</div>
        <h1>FitLogger</h1>
        <p class="subtitle">智能健身训练记录助手</p>
        <div class="badge">AI 驱动 · 本地优先 · 隐私安全</div>

        <div class="features">
            <div class="feature-item"><span>📋</span>AI 训练计划生成</div>
            <div class="feature-item"><span>📊</span>训练数据追踪</div>
            <div class="feature-item"><span>👥</span>社区互动分享</div>
            <div class="feature-item"><span>📱</span>本地优先 · 离线可用</div>
        </div>

        <div class="tagline">
            “每一次挥汗，都是蜕变的开始”<br>
            <span style="font-size:14px; color:#666;">—— FitLogger</span>
        </div>

        <div class="footer">
            <p>📩 联系开发者：<a href="mailto:你的邮箱@qq.com">你的邮箱@qq.com</a></p>
            <p style="margin-top:4px;">© 2026 FitLogger · 用 ❤️ 打造</p>
        </div>
    </div>
</body>
</html>
